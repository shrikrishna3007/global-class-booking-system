spring:
  application:
    name: global-class-offering-booking-system

  datasource:
    url: jdbc:mysql://localhost:3306/class_booking_system
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto : update
    show-sql: true

  server:
    servlet:
      context-path: /api


